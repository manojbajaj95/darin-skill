name: release-please

# https://github.com/googleapis/release-please
# https://github.com/googleapis/release-please-action
#
# Release Please opens/updates a Release PR with CHANGELOG + version bump.
# Merge that PR → GitHub Release + tag. npm publish runs when release is created.
#
# Commits must follow Conventional Commits: feat:, fix:, docs:, etc.
# https://www.conventionalcommits.org/
#
# npm publish uses trusted publishing (OIDC) — no NPM_TOKEN secret needed.
# One-time setup on npmjs.com: package "@getdarin/cli" → Settings → Trusted publishing
# → GitHub Actions → repo manojbajaj95/ai-pm-skill, workflow release-please.yml.
# Requires npm CLI >=11.5.1 (bundled with Node 24), hence node-version 24 below.
# Note: OIDC can't bootstrap a package's first-ever publish — that one publish
# has to happen manually (npm publish from a maintainer's machine) before the
# trusted publisher can be configured.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs['packages/cli--release_created'] == 'true' }}
        with:
          ref: ${{ steps.release.outputs['packages/cli--tag_name'] }}

      - uses: actions/setup-node@v4
        if: ${{ steps.release.outputs['packages/cli--release_created'] == 'true' }}
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Test CLI
        if: ${{ steps.release.outputs['packages/cli--release_created'] == 'true' }}
        working-directory: packages/cli
        run: |
          node scripts/prepack.mjs
          node bin/darin.mjs --version
          mkdir -p /tmp/darin-release-test/.cursor
          node bin/darin.mjs install -y --target /tmp/darin-release-test --providers=cursor
          test -f /tmp/darin-release-test/.cursor/skills/darin/SKILL.md

      - name: Publish to npm (trusted publishing / OIDC)
        if: ${{ steps.release.outputs['packages/cli--release_created'] == 'true' }}
        working-directory: packages/cli
        run: npm publish --access public --provenance
